<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --tile-bg: rgba(28,28,30,0.55);
    --tile-bg-hover: rgba(40,40,42,0.75);
    --text:#fff;
    --sub:#bbb;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family:"SF Mono","JetBrains Mono",ui-monospace,Consolas,monospace;
    overflow:hidden;
    background: #000 center/cover no-repeat;
    background-image: url('wall1.jpg');
  }
  .wrap{
    height:100%;
    display:flex;flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:48px;
  }
  .clock{
    color:var(--text);
    text-align:center;
    user-select:none;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .clock #day{font-size:28px;font-weight:600;opacity:.85;}
  .clock #time{font-size:60px;font-weight:700;letter-spacing:1px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(5, 150px);
    grid-auto-rows:64px;
    gap:14px;
  }
  .tile{
    position:relative;
    background:var(--tile-bg);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 14px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  .tile:hover{
    background:var(--tile-bg-hover);
    transform:translateY(-2px);
  }
  .tile::before{
    content:"";
    position:absolute;
    left:0;top:8px;bottom:8px;
    width:3px;
    border-radius:3px;
    background:var(--accent,#888);
  }
  .tile i{
    font-size:20px;
    color:#fff;
    width:22px;
    text-align:center;
    flex-shrink:0;
  }
  .tile span{
    color:var(--text);
    font-size:14px;
    font-weight:600;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .settings-btn{
    position:fixed;
    bottom:20px;right:20px;
    width:38px;height:38px;
    background:rgba(28,28,30,0.6);
    backdrop-filter:blur(6px);
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .15s;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="clock">
    <div id="day"></div>
    <div id="time"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script src="newtab.js"></script>
</body>
</html>
