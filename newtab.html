<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --text:#fff;
    --sub:#bbb;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family:"SF Mono","JetBrains Mono",ui-monospace,Consolas,monospace;
    overflow:hidden;
    background: #000 center/cover no-repeat;
    background-image: url('wall1.jpg');
  }
  .wrap{
    height:100%;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
    padding:0 80px;
  }

  /* ---------- left: link list ---------- */
  .links{
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .link-item{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .link-item:hover{
    transform:translateX(4px);
    opacity:.85;
  }
  .link-item i{
    font-size:20px;
    width:24px;
    text-align:center;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    flex-shrink:0;
  }
  .link-item span{
    font-size:17px;
    font-weight:700;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    white-space:nowrap;
  }

  /* ---------- right: clock + calendar ---------- */
  .side{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:36px;
  }
  .clock{
    color:var(--text);
    text-align:right;
    user-select:none;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .clock #day{font-size:22px;font-weight:600;opacity:.85;}
  .clock #time{font-size:52px;font-weight:700;letter-spacing:1px;}

  .calendar{
    background:rgba(28,28,30,0.55);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px 18px;
    width:260px;
    user-select:none;
  }
  .calendar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:var(--text);
    font-size:14px;
    font-weight:700;
    margin-bottom:10px;
    text-transform:capitalize;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:4px;
  }
  .calendar-grid .dow{
    color:var(--sub);
    font-size:11px;
    text-align:center;
    font-weight:600;
    padding-bottom:4px;
  }
  .calendar-grid .day{
    color:var(--text);
    font-size:12px;
    text-align:center;
    padding:6px 0;
    border-radius:6px;
    opacity:.85;
  }
  .calendar-grid .day.empty{
    opacity:0;
  }
  .calendar-grid .day.today{
    background:rgba(255,255,255,0.18);
    font-weight:700;
    opacity:1;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="links" id="links"></div>

  <div class="side">
    <div class="clock">
      <div id="day"></div>
      <div id="time"></div>
    </div>
    <div class="calendar">
      <div class="calendar-header" id="cal-header"></div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
  </div>
</div>

<script src="newtab.js"></script>
</body>
</html>
