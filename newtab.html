<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --text:#fff;
    --sub:#bbb;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family:"SF Mono","JetBrains Mono",ui-monospace,Consolas,monospace;
    overflow:hidden;
    background: #000 center/cover no-repeat;
    background-image: url('wall1.jpg');
  }
  .wrap{
    position:relative;
    height:100%;
  }

  /* ---------- left: quick links (vertical) ---------- */
  .links{
    position:absolute;
    left:80px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:14px;
    transition:opacity .4s ease;
  }
  .group-title{
    color:var(--sub);
    font-size:11px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin:10px 0 -2px;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .group-title:first-child{
    margin-top:0;
  }
  .link-item{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .link-item:hover{
    transform:translateX(4px);
    opacity:.85;
  }
  .link-item .kbd{
    font-size:10px;
    font-weight:700;
    color:var(--sub);
    width:14px;
    text-align:center;
    flex-shrink:0;
  }
  .link-item i{
    font-size:18px;
    width:22px;
    text-align:center;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    flex-shrink:0;
  }
  .link-item span{
    font-size:16px;
    font-weight:700;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    white-space:nowrap;
  }

  /* ---------- center: clock + search ---------- */
  .center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .clock{
    color:var(--text);
    text-align:center;
    user-select:none;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .clock #time{font-size:64px;font-weight:700;letter-spacing:1px;}

  .search{
    display:flex;
    align-items:center;
    gap:10px;
    width:320px;
  }
  .search i{
    color:var(--sub);
    font-size:14px;
  }
  .search input{
    flex:1;
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(255,255,255,0.25);
    color:var(--text);
    font-family:inherit;
    font-size:15px;
    padding:6px 2px;
    outline:none;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .search input::placeholder{
    color:var(--sub);
  }

  /* ---------- right: calendar + weather ---------- */
  .side{
    position:absolute;
    right:80px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:row;
    align-items:flex-start;
    gap:16px;
    transition:opacity .4s ease;
  }

  .card{
    background:rgba(28,28,30,0.55);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px 18px;
    user-select:none;
  }

  .calendar{
    width:220px;
  }
  .calendar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:var(--text);
    font-size:14px;
    font-weight:700;
    margin-bottom:10px;
    text-transform:capitalize;
  }
  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:4px;
  }
  .calendar-grid .dow{
    color:var(--sub);
    font-size:11px;
    text-align:center;
    font-weight:600;
    padding-bottom:4px;
  }
  .calendar-grid .day{
    color:var(--text);
    font-size:12px;
    text-align:center;
    padding:6px 0;
    border-radius:6px;
    opacity:.85;
  }
  .calendar-grid .day.empty{
    opacity:0;
  }
  .calendar-grid .day.today{
    background:rgba(255,255,255,0.18);
    font-weight:700;
    opacity:1;
  }

  /* ---------- weather ---------- */
  .weather{
    width:130px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:var(--text);
    text-align:center;
  }
  .weather i{
    font-size:26px;
    color:var(--text);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .weather .temp{
    font-size:24px;
    font-weight:700;
  }
  .weather .desc{
    font-size:11px;
    color:var(--sub);
    text-transform:capitalize;
  }
  .weather .place{
    font-size:10px;
    color:var(--sub);
    white-space:nowrap;
    max-width:120px;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* ---------- idle: hide links + calendar/weather, keep clock and search ---------- */
  body.idle .links,
  body.idle .side{
    opacity:0;
    pointer-events:none;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="links" id="links"></div>

  <div class="center">
    <div class="clock">
      <div id="time"></div>
    </div>
    <div class="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search-input" placeholder="Search DuckDuckGo…" autocomplete="off" spellcheck="false">
    </div>
  </div>

  <div class="side">
    <div class="card calendar">
      <div class="calendar-header" id="cal-header"></div>
      <div class="calendar-grid" id="cal-grid"></div>
    </div>
    <div class="card weather" id="weather">
      <i class="fa-solid fa-spinner fa-spin"></i>
      <div class="desc">Loading…</div>
    </div>
  </div>
</div>

<script src="newtab.js"></script>
</body>
</html>
