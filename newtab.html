<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Tab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root{
    --text:#fff;
    --sub:#bbb;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    font-family:"SF Mono","JetBrains Mono",ui-monospace,Consolas,monospace;
    overflow:hidden;
    background: #000 center/cover no-repeat;
    background-image: url('wall1.jpg');
  }
  .wrap{
    position:relative;
    height:100%;
  }

  .card{
    background:rgba(28,28,30,0.55);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;
    padding:16px 18px;
    user-select:none;
  }

  /* ---------- left: quick links (vertical) ---------- */
  .links{
    position:absolute;
    left:80px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:14px;
    transition:opacity .4s ease;
  }
  .link-item{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
    cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .link-item:hover{
    transform:translateX(4px);
    opacity:.85;
  }
  .link-item i{
    font-size:18px;
    width:22px;
    text-align:center;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    flex-shrink:0;
  }
  .link-item span{
    font-size:16px;
    font-weight:700;
    color:var(--accent,#fff);
    text-shadow:0 2px 8px rgba(0,0,0,.6);
    white-space:nowrap;
  }

  /* ---------- quick note (below search) ---------- */
  .notes{
    width:320px;
    margin-top:20px;
    transition:opacity .4s ease;
  }
  .notes-label{
    color:var(--sub);
    font-size:11px;
    font-weight:700;
    letter-spacing:1.5px;
    text-transform:uppercase;
    margin-bottom:8px;
    text-align:center;
  }
  .notes textarea{
    width:100%;
    min-height:60px;
    resize:vertical;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    line-height:1.5;
    outline:none;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .notes textarea::placeholder{
    color:var(--sub);
  }

  /* ---------- center: greeting + clock + search ---------- */
  .center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .clock{
    color:var(--text);
    text-align:center;
    user-select:none;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  .clock #greeting{
    font-size:16px;
    font-weight:600;
    color:var(--sub);
    margin-bottom:6px;
  }
  .clock #time{font-size:64px;font-weight:700;letter-spacing:1px;}

  .search{
    display:flex;
    align-items:center;
    gap:10px;
    width:320px;
  }
  .search i{
    color:var(--sub);
    font-size:14px;
    flex-shrink:0;
  }
  .search input{
    flex:1;
    background:transparent;
    border:none;
    color:var(--text);
    font-family:inherit;
    font-size:15px;
    padding:2px;
    outline:none;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .search input::placeholder{
    color:var(--sub);
  }

  /* ---------- right: calendar + weather in one card ---------- */
  .side{
    position:absolute;
    right:80px;
    top:50%;
    transform:translateY(-50%);
    transition:opacity .4s ease;
  }

  .calendar-weather{
    width:220px;
  }
  .calendar-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:var(--text);
    font-size:14px;
    font-weight:700;
    margin-bottom:10px;
    text-transform:capitalize;
  }

  .week-progress{
    display:flex;
    gap:5px;
    margin-bottom:12px;
  }
  .week-progress .seg{
    flex:1;
    height:4px;
    border-radius:2px;
    background:rgba(255,255,255,0.12);
  }
  .week-progress .seg.past{
    background:rgba(255,255,255,0.35);
  }
  .week-progress .seg.today{
    background:var(--text);
  }

  .calendar-grid{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:4px;
  }
  .calendar-grid .dow{
    color:var(--sub);
    font-size:11px;
    text-align:center;
    font-weight:600;
    padding-bottom:4px;
  }
  .calendar-grid .day{
    color:var(--text);
    font-size:12px;
    text-align:center;
    padding:6px 0;
    border-radius:6px;
    opacity:.85;
  }
  .calendar-grid .day.empty{
    opacity:0;
  }
  .calendar-grid .day.today{
    background:rgba(255,255,255,0.18);
    font-weight:700;
    opacity:1;
  }

  .weather-row{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--text);
  }
  .weather-row i{
    font-size:26px;
    width:30px;
    text-align:center;
    text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .weather-row .info{
    display:flex;
    flex-direction:column;
    line-height:1.3;
  }
  .weather-row .temp{
    font-size:18px;
    font-weight:700;
  }
  .weather-row .desc{
    font-size:11px;
    color:var(--sub);
  }
  .weather-row .place{
    font-size:10px;
    color:var(--sub);
  }

  /* ---------- idle: hide links + notes + calendar/weather, keep clock and search ---------- */
  body.idle .links,
  body.idle .notes,
  body.idle .side{
    opacity:0;
    pointer-events:none;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="links" id="links"></div>

  <div class="center">
    <div class="clock">
      <div id="greeting"></div>
      <div id="time"></div>
    </div>
    <div class="card search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="search-input" placeholder="Search DuckDuckGo…" autocomplete="off" spellcheck="false">
    </div>
    <div class="notes">
      <div class="notes-label">Quick note</div>
      <textarea id="note-input" placeholder="Type something…"></textarea>
    </div>
  </div>

  <div class="side">
    <div class="card calendar-weather">
      <div class="calendar-header" id="cal-header"></div>
      <div class="week-progress" id="week-progress"></div>
      <div class="calendar-grid" id="cal-grid"></div>
      <div class="weather-row" id="weather">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <div class="info"><div class="desc">Loading…</div></div>
      </div>
    </div>
  </div>
</div>

<script src="newtab.js"></script>
</body>
</html>
